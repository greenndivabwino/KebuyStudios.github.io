name: Genera lista download
on:
  push:
    branches: [ main ]
    paths:
      - 'downloads/**'
  workflow_dispatch:

jobs:
  generate-listing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate directory listing
        uses: yKicchan/generate-directory-listing-action@v1
        with:
          target: downloads
          showHiddenFiles: false
          override: true
          
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add downloads/index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "Aggiorna lista download [skip ci]"
          git push
