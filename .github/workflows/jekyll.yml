# Workflow per Jekyll - Kebuy Studios
name: 🎨 Deploy con Jekyll

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Scarica il codice
        uses: actions/checkout@v4
      
      - name: ⚙️ Configura GitHub Pages
        uses: actions/configure-pages@v5
      
      - name: 🏗️ Costruisci il sito con Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      
      - name: 📦 Prepara l'arte fatto
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 🌍 Pubblica su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
