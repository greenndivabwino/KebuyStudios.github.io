# Workflow per il sito statico di Kebuy Studios
name: 🚀 Deploy sito statico

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Scarica il codice
        uses: actions/checkout@v4
      
      - name: ⚙️ Configura GitHub Pages
        uses: actions/configure-pages@v5
      
      - name: 📦 Prepara i file da pubblicare
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: 🌍 Pubblica su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
